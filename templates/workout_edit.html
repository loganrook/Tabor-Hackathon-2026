{% extends "base.html" %}
{% block title %}Edit workout — {{ team.name }}{% endblock %}
{% block content %}
<div class="auth-card">
    <h1>Edit workout</h1>

    <form action="{{ url_for('workout_edit', team_id=team.id, workout_id=workout.id) }}" method="post" id="workout-form">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" value="{{ workout.title }}" required>
        </div>

        <div class="form-group">
            <label for="description">Description (optional)</label>
            <textarea id="description" name="description">{{ workout.description or '' }}</textarea>
        </div>

        <div class="form-group">
            <label for="assign_to">Assign to</label>
            <select id="assign_to" name="assign_to">
                <option value="" {{ 'selected' if not workout.group_id else '' }}>Entire Team</option>
                {% for g in groups %}
                <option value="g{{ g.id }}" {{ 'selected' if workout.group_id == g.id else '' }}>{{ g.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="due_date">Due date (optional)</label>
            <input type="date" id="due_date" name="due_date" value="{{ workout.due_date.strftime('%Y-%m-%d') if workout.due_date else '' }}">
        </div>

        <div class="section">
            <h2 class="section-heading">Exercises</h2>
            <div id="exercise-rows">
                {% for ex in exercises %}
                <div class="exercise-row-form">
                    <input type="hidden" name="exercise_id" value="{{ ex.id }}">
                    <div class="form-group">
                        <label>Exercise name</label>
                        <input type="text" name="exercise_name" value="{{ ex.name }}" required>
                    </div>
                    <div class="form-group" style="display:flex; gap:0.5rem;">
                        <div style="flex:1;">
                            <label>Sets</label>
                            <input type="number" name="exercise_sets" min="0" value="{{ ex.sets if ex.sets is not none else '' }}">
                        </div>
                        <div style="flex:1;">
                            <label>Reps (you can enter 10,8 for different reps per set)</label>
                            <input type="text" name="exercise_reps" min="0" value="{{ exercise_reps_display.get(ex.id, ex.reps if ex.reps is not none else '') }}">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Notes (optional)</label>
                        <textarea name="exercise_notes">{{ ex.notes or '' }}</textarea>
                    </div>
                    <button type="button" class="btn-secondary btn-small remove-exercise-btn">Remove</button>
                    <hr>
                </div>
                {% endfor %}
            </div>
            <button type="button" class="btn-secondary btn-small" id="add-exercise-btn">
                <i class="bi bi-plus-lg"></i> Add Exercise
            </button>
        </div>

        <button type="submit" class="btn-primary">Save changes</button>
    </form>

    <p class="auth-footer">
        <a href="{{ url_for('workout_detail', team_id=team.id, workout_id=workout.id) }}" class="back-link">← Back to workout</a>
    </p>
</div>

<script>
(function() {
    var rowsContainer = document.getElementById('exercise-rows');
    var addBtn = document.getElementById('add-exercise-btn');

    function createRow() {
        var wrapper = document.createElement('div');
        wrapper.className = 'exercise-row-form';
        wrapper.innerHTML =
            '<input type="hidden" name="exercise_id" value="">' +
            '<div class="form-group">' +
            '  <label>Exercise name</label>' +
            '  <input type="text" name="exercise_name" required>' +
            '</div>' +
            '<div class="form-group" style="display:flex; gap:0.5rem;">' +
            '  <div style="flex:1;">' +
            '    <label>Sets</label>' +
            '    <input type="number" name="exercise_sets" min="0">' +
            '  </div>' +
            '  <div style="flex:1;">' +
            '    <label>Reps (you can enter 10,8 for different reps per set)</label>' +
            '    <input type="text" name="exercise_reps">' +
            '  </div>' +
            '</div>' +
            '<div class="form-group">' +
            '  <label>Notes (optional)</label>' +
            '  <textarea name="exercise_notes"></textarea>' +
            '</div>' +
            '<button type="button" class="btn-secondary btn-small remove-exercise-btn">Remove</button>' +
            '<hr>';

        var removeBtn = wrapper.querySelector('.remove-exercise-btn');
        removeBtn.addEventListener('click', function() {
            rowsContainer.removeChild(wrapper);
        });

        rowsContainer.appendChild(wrapper);
    }

    if (addBtn) {
        addBtn.addEventListener('click', function() {
            createRow();
        });
    }

    Array.prototype.forEach.call(
        document.querySelectorAll('.remove-exercise-btn'),
        function(btn) {
            btn.addEventListener('click', function() {
                var row = btn.closest('.exercise-row-form');
                if (row && rowsContainer) {
                    rowsContainer.removeChild(row);
                }
            });
        }
    );
})();
</script>
{% endblock %}
