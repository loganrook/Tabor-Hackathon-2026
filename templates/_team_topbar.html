{# _team_topbar.html — Universal top bar: contextual title left, profile circle + Log out right. #}
<header class="team-topbar">
    <h1 class="team-topbar-name">
        {% if team is defined %}
            {{ team.name }}
        {% elif request.endpoint == 'dashboard' %}
            My Teams
        {% else %}
            CoachHub
        {% endif %}
    </h1>
    <div class="team-topbar-right">
        <a href="{{ url_for('profile') }}" class="team-topbar-profile-link" aria-label="Account">
            <span class="team-profile-circle">{{ current_user.name[0]|upper if current_user.name else '?' }}</span>
        </a>
        <a href="{{ url_for('logout') }}" class="team-topbar-logout">Log out</a>
    </div>
</header>
