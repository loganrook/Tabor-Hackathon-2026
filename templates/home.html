{# home.html — Minimal landing: title, tagline, Log In / Sign Up only. #}
{% extends "base.html" %}
{% block title %}GamePlan{% endblock %}

{% block content %}
<div class="landing-page">
    <div class="landing-hero">
        <div class="landing-hero-inner">
            <h1 class="landing-title">GamePlan</h1>
            <p class="landing-tagline">The modern playbook for coaches and athletes.</p>
            <div class="landing-actions">
                <a href="{{ url_for('login') }}" class="btn-landing btn-landing-secondary">Log In</a>
                <a href="{{ url_for('register') }}" class="btn-landing btn-landing-primary">Sign Up</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
(function () {
    document.addEventListener('DOMContentLoaded', function () {
        document.body.classList.add('home-landing');
    });
})();
</script>
{% endblock %}
