{# home.html — Landing: one headline, two role buttons. #}
{% extends "base.html" %}
{% block title %}CoachHub{% endblock %}
{% block content %}
<div class="hero-block">
    <h1>Connect with your coach and team.</h1>
    <div class="hero-buttons">
        <a href="{{ url_for('register', role='coach') }}" class="btn-hero">I'm a Coach</a>
        <a href="{{ url_for('register', role='athlete') }}" class="btn-hero">I'm an Athlete</a>
    </div>
</div>
{% endblock %}
