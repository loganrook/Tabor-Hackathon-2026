{# join_team.html — Centered card, invite code field, one button, back link. #}
{% extends "base.html" %}
{% block title %}Join a team — GamePlan{% endblock %}
{% block content %}
<div class="auth-card">
    <h1>Join a team</h1>
    <p class="hero-sub" style="margin-top: -0.5rem; margin-bottom: 1.25rem;">
        Enter your team’s invite code to join as a player or coach.
    </p>
    <form action="{{ url_for('join_team') }}" method="post">
        <div class="form-group">
            <label for="invite_code">Invite code</label>
            <input type="text" id="invite_code" name="invite_code" maxlength="8" required value="{{ invite_code|default('') }}">
        </div>
        <button type="submit" class="btn-primary">Join team</button>
    </form>
    <p class="auth-footer"><a href="{{ url_for('dashboard') }}" class="back-link">← Back to dashboard</a></p>
</div>
{% endblock %}
