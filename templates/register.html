{# register.html — Centered card, role pre-selected from home link, one submit button. #}
{% extends "base.html" %}
{% block title %}Create account — CoachHub{% endblock %}
{% block content %}
<div class="auth-card">
    <h1>Create account</h1>
    <form action="{{ url_for('register') }}" method="post">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        <div class="form-group">
            <label>I am a…</label>
            <div class="role-toggle">
                <input type="radio" name="role" id="role-coach" value="coach" {{ 'checked' if (role_param|default('coach')) == 'coach' else '' }}>
                <label for="role-coach">Coach</label>
                <input type="radio" name="role" id="role-athlete" value="athlete" {{ 'checked' if role_param == 'athlete' else '' }}>
                <label for="role-athlete">Athlete</label>
            </div>
        </div>
        <button type="submit" class="btn-primary">Create account</button>
    </form>
    <p class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
</div>
{% endblock %}
