{# login.html — Centered card, labels above inputs, one submit button. #}
{% extends "base.html" %}
{% block title %}Log in — RepRoom{% endblock %}
{% block content %}
<div class="auth-card">
    <h1>Log in</h1>
    <form action="{{ url_for('login') }}" method="post">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn-primary">Log in</button>
    </form>
    <p class="auth-footer">Don't have an account? <a href="{{ url_for('register') }}">Sign up</a></p>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
(function () {
    document.addEventListener('DOMContentLoaded', function () {
        document.body.classList.add('auth-dark');
    });
})();
</script>
{% endblock %}
