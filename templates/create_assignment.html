{# create_assignment.html — Centered card, title + description, one button, back link. #}
{% extends "base.html" %}
{% block title %}Add assignment — {{ team.name }}{% endblock %}
{% block content %}
<div class="auth-card">
    <h1>Add assignment</h1>
    <form action="{{ url_for('create_team_assignment', team_id=team.id) }}" method="post">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" required>
        </div>
        <div class="form-group">
            <label for="description">Description (optional)</label>
            <textarea id="description" name="description"></textarea>
        </div>
        <button type="submit" class="btn-primary">Add assignment</button>
    </form>
    <p class="auth-footer"><a href="{{ url_for('team_dashboard', team_id=team.id) }}" class="back-link">← Back to team</a></p>
</div>
{% endblock %}
