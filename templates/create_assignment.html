{# create_assignment.html — Create assignment for a specific team (coach only). #}
{% extends "base.html" %}
{% block title %}Create Assignment — {{ team.name }}{% endblock %}

{% block content %}
<h1>Create assignment — {{ team.name }}</h1>
<form action="{{ url_for('create_team_assignment', team_id=team.id) }}" method="post" class="create-assignment-form">
    <label for="title">Title</label>
    <input type="text" id="title" name="title" required>
    <label for="description">Description (optional)</label>
    <textarea id="description" name="description" rows="4"></textarea>
    <button type="submit">Create assignment</button>
</form>
<p><a href="{{ url_for('team_dashboard', team_id=team.id) }}">Back to team</a></p>
{% endblock %}
