{# team_create.html — Centered card, team name field, one button, back link. #}
{% extends "base.html" %}
{% block title %}Create team — CoachHub{% endblock %}
{% block content %}
<div class="auth-card">
    <h1>Create team</h1>
    <form action="{{ url_for('create_team') }}" method="post">
        <div class="form-group">
            <label for="name">Team name</label>
            <input type="text" id="name" name="name" required>
        </div>
        <button type="submit" class="btn-primary">Create team</button>
    </form>
    <p class="auth-footer"><a href="{{ url_for('coach_dashboard') }}" class="back-link">← Back to dashboard</a></p>
</div>
{% endblock %}
