{# create_announcement.html — Centered card, form, back link. #}
{% extends "base.html" %}
{% block title %}Post announcement — {{ team.name }}{% endblock %}
{% block content %}
<div class="auth-card">
    <h1>Post announcement</h1>
    <form action="{{ url_for('create_team_announcement', team_id=team.id) }}" method="post">
        <div class="form-group">
            <label for="content">Message</label>
            <textarea id="content" name="content" rows="4" placeholder="Write your announcement..." required></textarea>
        </div>
        <div class="form-group">
            <label for="announce_to">Audience</label>
            <select id="announce_to" name="announce_to">
                <option value="">Entire Team</option>
                {% for g in groups %}
                <option value="g{{ g.id }}">{{ g.name }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn-primary">Post announcement</button>
    </form>
    <p class="auth-footer"><a href="{{ url_for('team_dashboard', team_id=team.id) }}" class="back-link">← Back to team</a></p>
</div>
{% endblock %}
