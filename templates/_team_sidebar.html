{# _team_sidebar.html — Shared team sidebar: Home/My Teams, Roster, Groups, Settings (coach). #}
<aside class="team-sidebar" id="team-sidebar">
    <button type="button" class="team-sidebar-toggle" id="sidebar-toggle" aria-label="Toggle menu"><i class="bi bi-list"></i></button>
    <nav class="team-sidebar-nav">
        <a href="{{ url_for('dashboard') }}" class="team-sidebar-home">
            <i class="bi bi-house"></i>
            <span>My Teams</span>
        </a>
        <hr class="team-sidebar-divider">
        <a href="{{ url_for('team_roster', team_id=team.id) }}" class="team-sidebar-link {{ 'active' if request.endpoint == 'team_roster' else '' }}">Roster</a>
        <a href="{{ url_for('team_groups', team_id=team.id) }}" class="team-sidebar-link {{ 'active' if request.endpoint == 'team_groups' else '' }}">Groups</a>
        {% if is_coach %}
        <div class="team-sidebar-footer">
            <a href="{{ url_for('team_settings', team_id=team.id) }}" class="team-sidebar-settings" title="Team settings"><i class="bi bi-gear"></i></a>
        </div>
        {% endif %}
    </nav>
</aside>
