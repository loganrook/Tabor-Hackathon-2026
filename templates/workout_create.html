{% extends "base.html" %}
{% block title %}Create workout — {{ team.name }}{% endblock %}
{% block content %}
<div class="team-dash-wrapper">
    {% include '_team_sidebar.html' %}

    <main class="team-dash-main">
        {% include '_team_topbar.html' %}

        <div class="team-dash-content">
            <div class="team-page-content">
                <div class="team-page-heading-row">
                    <h2 class="team-page-heading">Create workout</h2>
                    <a href="{{ url_for('team_dashboard', team_id=team.id) }}" class="back-link back-link-small">← Back to team</a>
                </div>

                <form action="{{ url_for('create_team_workout', team_id=team.id) }}" method="post" id="workout-form">
                    <div class="form-group">
                        <label for="title">Title</label>
                        <input type="text" id="title" name="title" required>
                    </div>

                    <div class="form-group">
                        <label for="description">Description (optional)</label>
                        <textarea id="description" name="description"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="assign_to">Who is this workout for?</label>
                        <select id="assign_to" name="assign_to">
                            <option value="">Entire Team</option>
                            {% for g in groups %}
                            <option value="g{{ g.id }}">{{ g.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="due_date">When is it due? (optional)</label>
                        <input type="date" id="due_date" name="due_date">
                    </div>

                    <div class="section">
                        <h2 class="section-heading">Exercises</h2>
                        <div id="exercise-rows"></div>
                        <button type="button" class="btn-secondary btn-small" id="add-exercise-btn">
                            <i class="bi bi-plus-lg"></i> Add Exercise
                        </button>
                    </div>

                    <button type="submit" class="btn-primary">Save workout</button>
                </form>
            </div>
        </div>
    </main>
</div>

<script>
(function() {
    var sidebar = document.getElementById('team-sidebar');
    var sidebarToggle = document.getElementById('sidebar-toggle');
    if (sidebarToggle && sidebar) {
        sidebarToggle.addEventListener('click', function() {
            sidebar.classList.toggle('open');
        });
    }
})();
</script>

<script>
(function() {
    var rowsContainer = document.getElementById('exercise-rows');
    var addBtn = document.getElementById('add-exercise-btn');

    function createRow(data) {
        data = data || {};
        var wrapper = document.createElement('div');
        wrapper.className = 'exercise-row-form';
        wrapper.innerHTML =
            '<div class="form-group">' +
            '  <label>Exercise name</label>' +
            '  <input type="text" name="exercise_name" value="' + (data.name || '') + '" required>' +
            '</div>' +
            '<div class="form-group" style="display:flex; gap:0.5rem;">' +
            '  <div style="flex:1;">' +
            '    <label>Sets</label>' +
            '    <input type="number" name="exercise_sets" min="0" value="' + (data.sets != null ? data.sets : '') + '">' +
            '  </div>' +
            '  <div style="flex:1;">' +
            '    <label>Reps (you can enter 10,8 for different reps per set)</label>' +
            '    <input type="text" name="exercise_reps" value="' + (data.reps != null ? data.reps : '') + '">' +
            '  </div>' +
            '</div>' +
            '<div class="form-group">' +
            '  <label>Notes (optional)</label>' +
            '  <textarea name="exercise_notes">' + (data.notes || '') + '</textarea>' +
            '</div>' +
            '<button type="button" class="btn-secondary btn-small remove-exercise-btn">Remove</button>' +
            '<hr>';

        var removeBtn = wrapper.querySelector('.remove-exercise-btn');
        removeBtn.addEventListener('click', function() {
            rowsContainer.removeChild(wrapper);
        });

        rowsContainer.appendChild(wrapper);
    }

    function ensureAtLeastOneRow() {
        if (!rowsContainer.children.length) {
            createRow();
        }
    }

    if (addBtn) {
        addBtn.addEventListener('click', function() {
            createRow();
        });
    }

    ensureAtLeastOneRow();
})();
</script>
{% endblock %}
